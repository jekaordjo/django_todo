<div class="text-muted small text-center py-2">
    DJANGO: { % extends 'base.html' % }
    <br />
    DJANGO: { % block content % }
</div>
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <section class="card shadow-sm border-0 rounded-4">
            <div class="card-body p-4">
                <h1 class="h4 mb-1">Вход</h1>
                <p class="text-muted mb-4">Войди в аккаунт чтобы управлять задачами.</p>
                <form method="post">
                    <div class="text-muted small mb-3">DJANGO: csrf_token</div>
                    <div class="mb-3">
                        <label class="form-label">Логин или Email</label>
                        <input type="text" class="form-control" placeholder="Введите логин" />
                        <div class="form-text text-muted">DJANGO: {{ form.username }}</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Пароль</label>
                        <input type="password" class="form-control" placeholder="Введите пароль" />
                        <div class="form-text text-muted">DJANGO: {{ form.password }}</div>
                    </div>
                    <button class="btn btn-primary w-100" type="submit">Войти</button>
                </form>
                <hr class="my-4" />
                <p class="text-muted small mb-0 text-center">
                    Нет аккаунта?
                    <a href="#" class="text-decoration-none">
                        Зарегистрироваться
                        <span class="text-muted d-block">DJANGO: { % url 'register' % }</span>
                    </a>
                </p>
            </div>
        </section>
    </div>
</div>
<div class="text-muted small text-center py-2">DJANGO: { % endblock % }</div>

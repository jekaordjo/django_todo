<div class="text-muted small text-center py-2">
    DJANGO: { % extends 'base.html' % }
    <br />
    DJANGO: { % block content % }
</div>
<section class="mb-4">
    <h1 class="h3 mb-1">Удалить задачу?</h1>
    <p class="text-muted mb-0">Это действие нельзя отменить.</p>
</section>
<section class="card shadow-sm border-0 rounded-4">
    <div class="card-body p-4">
        <div class="alert alert-danger">
            <div class="fw-semibold">Ты точно хочешь удалить задачу?</div>
            <div class="mt-2">
                <span class="text-muted small">DJANGO: {{ todo.title }}</span>
            </div>
        </div>
        <form method="post">
            <div class="text-muted small mb-3">DJANGO: csrf_token</div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-danger">Да, удалить</button>
                <a href="#" class="btn btn-outline-secondary">
                    Отмена
                    <span class="text-muted small d-block">DJANGO: { % url 'todo_detail' todo.pk % }</span>
                </a>
            </div>
        </form>
    </div>
</section>
<div class="text-muted small text-center py-2">DJANGO: { % endblock % }</div>
